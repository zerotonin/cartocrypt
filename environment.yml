name: cartocrypt
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - networkx>=3.1
  - geopandas>=1.0
  - shapely>=2.0
  - osmnx>=1.7
  - numpy>=1.25
  - scipy>=1.11
  - matplotlib>=3.7
  - pyogrio>=0.7
  - click>=8.1
  - pip
  - pip:
    - cryptography>=41.0
    - pytest>=7.4
    - pytest-cov>=4.1
    - ruff>=0.1
    - mypy>=1.5
    - sphinx>=7.2
    - sphinx-rtd-theme>=1.3
    - sphinx-click>=5.0
